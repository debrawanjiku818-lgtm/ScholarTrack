services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: scholartrack
      POSTGRES_PASSWORD: scholartrack123
      POSTGRES_DB: scholartrack
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U scholartrack"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    ports:
      - "3001:4000"
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: scholartrack
      DB_PASSWORD: scholartrack123
      DB_NAME: scholartrack
      DATABASE_URL: postgresql://scholartrack:scholartrack123@postgres:5432/scholartrack
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
